<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MediaGuard{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">🛡️</span>
      <span class="brand-name">MediaGuard</span>
    </div>
    <nav>
      <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">Tableau de bord</a>
      <a href="/settings" class="nav-link {% if page == 'settings' %}active{% endif %}">Configuration</a>
      <a href="/ignored" class="nav-link {% if page == 'ignored' %}active{% endif %}">Imports ignorés</a>
      <a href="/excluded" class="nav-link {% if page == 'excluded' %}active{% endif %}">Médias exclus</a>
      <a href="/rules" class="nav-link {% if page == 'rules' %}active{% endif %}">Règles format</a>
      <a href="/anime" class="nav-link {% if page == 'anime' %}active{% endif %}">Suivi anime</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/docs" target="_blank" class="nav-link subtle">API Swagger</a>
    </div>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
