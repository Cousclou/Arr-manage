<div class="field-group">
  <label for="{{ field.key }}">{{ field.label }}</label>

  {% if field.type == 'toggle' %}
  <input type="hidden" name="{{ field.key }}" value="false">
  <label class="toggle">
    <input type="checkbox" name="{{ field.key }}" id="{{ field.key }}" value="true"
           {% if settings.get(field.key) == 'true' %}checked{% endif %}>
    <span class="toggle-slider"></span>
  </label>

  {% elif field.type == 'select' %}
  <select name="{{ field.key }}" id="{{ field.key }}" class="input">
    {% for opt in field.options %}
    <option value="{{ opt }}" {% if settings.get(field.key) == opt %}selected{% endif %}>{{ opt | upper }}</option>
    {% endfor %}
  </select>

  {% elif field.type == 'password' %}
  <input type="password" name="{{ field.key }}" id="{{ field.key }}" class="input"
         autocomplete="off"
         placeholder="{% if settings.get(field.key) %}Laisser vide pour conserver{% else %}Clé API{% endif %}">

  {% elif field.type == 'number' %}
  <input type="number" name="{{ field.key }}" id="{{ field.key }}" class="input"
         value="{{ settings.get(field.key, '') }}"
         {% if field.step %}step="{{ field.step }}"{% endif %}>

  {% else %}
  <input type="text" name="{{ field.key }}" id="{{ field.key }}" class="input"
         value="{{ settings.get(field.key, '') }}"
         {% if field.placeholder %}placeholder="{{ field.placeholder }}"{% endif %}>
  {% endif %}
</div>
